name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Unit + integration tests (nextest)
        run: cargo nextest run --workspace

      - name: Doc tests
        run: cargo test --doc --workspace

      - name: Documentation build
        # Warnings allowed but logged; a future ADR may make these fatal.
        run: cargo doc --workspace --no-deps --document-private-items
        continue-on-error: true

      # Placeholder for the scenario suite, added in E-M1-10.
      # - name: Scenario suite
      #   run: cargo nextest run -p ft-testkit --test scenarios

  ui:
    name: ui (web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install web deps
        run: pnpm -C crates/ft-ui/web install --frozen-lockfile=false

      - name: Verify ts-rs bindings are up to date
        run: cargo xtask check-ts

      - name: Typecheck
        run: pnpm -C crates/ft-ui/web typecheck

      - name: Build web bundle
        run: pnpm -C crates/ft-ui/web build

      - name: Unit tests
        run: pnpm -C crates/ft-ui/web test
