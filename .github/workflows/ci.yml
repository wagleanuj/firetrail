name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Unit + integration tests (nextest)
        run: cargo nextest run --workspace

      - name: Doc tests
        run: cargo test --doc --workspace

      - name: Documentation build
        # Warnings allowed but logged; a future ADR may make these fatal.
        run: cargo doc --workspace --no-deps --document-private-items
        continue-on-error: true

      # Placeholder for the scenario suite, added in E-M1-10.
      # - name: Scenario suite
      #   run: cargo nextest run -p ft-testkit --test scenarios
