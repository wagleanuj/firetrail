name: m1-happy-path
description: |
  Walks the full M1 user journey for one engineer: init → epic → tasks under
  the epic → dependency edge → acceptance criteria → claim → close-blocked →
  close-after-ACs → board reflects state → graph shows tree.

  M1 note: the `ready` index query treats `blocked` *status* as ungated input
  but does NOT yet re-read `.firetrail/relations.jsonl` for `blocked-by`
  filtering (firetrail-xqu / firetrail-tq7). To express the spec's "B is
  blocked by A" semantics in a way the index honours today, the scenario also
  sets task B's status to `blocked` and clears it after A closes. The `dep
  add` call is still made so the relation is recorded for `show` / `graph`.

setup:
  config:
    storage_mode: embedded
    strict_identity: false
    author_email: alice@example.com
    author_name: Alice Tester

steps:
  - name: init repo
    # `--no-agents` to avoid littering the tempdir; hooks ARE installed so
    # `doctor` reports a clean repo at the end of the scenario.
    run: firetrail init --json --no-agents
    expect:
      exit: 0
      stdout_json_path:
        command: init

  - name: create epic
    run: firetrail --json epic create "Improve checkout reliability"
    expect:
      exit: 0
    capture:
      epic_id: stdout_field=data.record.envelope.id

  - name: create task A
    run: firetrail --json task create "Add Redis pool alert" --epic ${epic_id}
    expect:
      exit: 0
    capture:
      task_a: stdout_field=data.record.envelope.id

  - name: create task B
    run: firetrail --json task create "Add retry budget" --epic ${epic_id}
    expect:
      exit: 0
    capture:
      task_b: stdout_field=data.record.envelope.id

  - name: B is blocked-by A (recorded in relations log)
    run: firetrail --json dep add ${task_b} ${task_a} --type blocked-by
    expect:
      exit: 0

  - name: simulate blocked status on B for M1 index semantics
    run: firetrail --json update ${task_b} --status blocked
    expect:
      exit: 0

  - name: add first acceptance criterion to A
    run: firetrail --json criteria add ${task_a} "Alert fires when Redis pool usage exceeds 85% for 5 minutes"
    expect:
      exit: 0

  - name: add second acceptance criterion to A
    run: firetrail --json criteria add ${task_a} "Alert includes service, environment, pool name"
    expect:
      exit: 0

  - name: ready lists task A but not task B (B is blocked)
    run: firetrail --json ready
    expect:
      exit: 0
      stdout_json_path:
        data.rows.0.id: ${task_a}

  - name: claim task A
    run: firetrail --json claim ${task_a}
    expect:
      exit: 0

  - name: close A fails with incomplete acceptance criteria
    run: firetrail --json close ${task_a}
    expect:
      exit: 1
      stderr_contains: "acceptance criteria"
      stderr_json_path:
        error.kind: user_error

  - name: check first AC
    run: firetrail --json criteria check ${task_a} 1
    expect:
      exit: 0

  - name: check second AC
    run: firetrail --json criteria check ${task_a} 2
    expect:
      exit: 0

  - name: close A succeeds now that ACs are checked
    run: firetrail --json close ${task_a}
    expect:
      exit: 0
      stdout_json_path:
        data.record.envelope.status: closed

  - name: unblock B now that A is closed
    run: firetrail --json update ${task_b} --status ready
    expect:
      exit: 0

  - name: ready now lists task B
    run: firetrail --json ready
    expect:
      exit: 0
      stdout_json_path:
        data.rows.0.id: ${task_b}

  - name: board groups task A under done
    # The board includes epics + tasks; the todo column therefore has both the
    # epic and task B in non-deterministic order. The structural assertion is
    # that task A is in the done column (the only closed record).
    run: firetrail --json board
    expect:
      exit: 0
      stdout_json_path:
        data.done.0.id: ${task_a}

  - name: graph from epic walks both children
    run: firetrail --json graph ${epic_id}
    expect:
      exit: 0
      stdout_json_path:
        data.root: ${epic_id}

  - name: doctor exits OK after the scripted scenario
    # `data.clean` is true only when every check is OK; with `--no-agents` the
    # repo lacks AGENTS.md so the agents check warns. We assert the
    # index.integrity / config.parse / git checks via exit code and a spot
    # check on storage.count instead.
    run: firetrail --json doctor
    expect:
      exit: 0
