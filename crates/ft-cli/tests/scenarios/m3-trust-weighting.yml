name: m3-trust-weighting
description: |
  M3 success criterion — hybrid search ranks higher-trust records ahead of
  lower-trust ones for the same query (ADR-0019 trust weighting).

  Authoring & promotion plan (mirrors the M2 trust-transitions scenario for
  per-step identity):
    - alice creates three findings that share body terms ("cache", "token").
    - bob reviews finding 2 and finding 3 (draft → reviewed).
    - carol promotes finding 3 with `--evidence-url` (reviewed → verified).
    - alice creates a work-tracking task on the same domain.

  After `index rebuild`, all three findings share the same lexical signal,
  so ranking is dominated by the trust + recency weighting. Higher-trust
  kinds (task: Reviewed default; epic: Reviewed default) outrank
  lower-trust memory kinds (finding: Draft default) for the same query.

  Materialised trust (firetrail-l1q)
  ----------------------------------
  `ft-search` writes the per-record body trust into the
  `records_search_meta` side table on every `upsert_lexical`, and reads it
  back via a LEFT JOIN in `lookup_meta`. Trust transitions therefore become
  visible to ranking immediately — the Verified finding outranks the
  Reviewed default work-tracking task, and a `--trust verified` floor
  surfaces only the promoted record.

setup:
  config:
    storage_mode: embedded
    strict_identity: false
    author_email: alice@example.com
    author_name: Alice Tester

steps:
  - name: init repo
    run: firetrail init --json --no-hooks --no-agents
    expect:
      exit: 0

  - name: alice creates a draft finding (will stay draft)
    run: firetrail --json finding create "Cache TTL bug — draft note" --details "shared cache cache token domain"
    expect:
      exit: 0
    capture:
      f_draft: stdout_field=data.record.envelope.id

  - name: alice creates a finding that bob will review
    run: firetrail --json finding create "Cache TTL bug — reviewed note" --details "shared cache cache token domain"
    expect:
      exit: 0
    capture:
      f_reviewed: stdout_field=data.record.envelope.id

  - name: alice creates a finding that carol will verify
    run: firetrail --json finding create "Cache TTL bug — verified note" --details "shared cache cache token domain" --risk-class security
    expect:
      exit: 0
    capture:
      f_verified: stdout_field=data.record.envelope.id

  - name: bob reviews finding 2 (draft → reviewed)
    run: firetrail --json memory review ${f_reviewed} --reason "load-test evidence in CI"
    env:
      FIRETRAIL_AUTHOR: bob@example.com
    expect:
      exit: 0
      stdout_json_path:
        data.record.body.trust: reviewed

  - name: bob reviews finding 3 so carol can promote
    run: firetrail --json memory review ${f_verified} --reason "load-test evidence in CI"
    env:
      FIRETRAIL_AUTHOR: bob@example.com
    expect:
      exit: 0
      stdout_json_path:
        data.record.body.trust: reviewed

  - name: carol promotes finding 3 to verified with evidence
    run: firetrail --json memory promote ${f_verified} --reason "validated by load test" --evidence-url "https://ci.example.com/runs/42"
    env:
      FIRETRAIL_AUTHOR: carol@example.com
    expect:
      exit: 0
      stdout_json_path:
        data.record.body.trust: verified

  - name: alice creates a task referencing the same domain
    run: firetrail --json task create "Raise cache TTL ceiling"
    expect:
      exit: 0
    capture:
      task_id: stdout_field=data.record.envelope.id

  - name: search now ranks the Verified finding ahead of the Reviewed-default task
    # All three findings share the same lexical signal; trust_weight is
    # higher for Verified than Reviewed, so finding_3 outranks task_id.
    run: firetrail --json search "cache" --mode lexical --limit 10
    expect:
      exit: 0
      stdout_json_path:
        data.mode: lexical
        data.hits.0.id: ${f_verified}
        data.hits.0.trust: verified

  - name: --trust verified leaves only the promoted finding
    run: firetrail --json search "cache" --mode lexical --trust verified
    expect:
      exit: 0
      stdout_json_path:
        data.mode: lexical
        data.hits.0.id: ${f_verified}
        data.hits.0.trust: verified

  - name: --trust reviewed keeps the task and both reviewed/verified findings, drops draft
    run: firetrail --json search "cache" --mode lexical --trust reviewed
    expect:
      exit: 0
      stdout_json_path:
        data.mode: lexical
        data.hits.0.trust: verified
