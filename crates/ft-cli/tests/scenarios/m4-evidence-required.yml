name: m4-evidence-required
description: |
  M4 success criterion #2 — high-stakes records must reach `Verified` with
  recorded evidence (ADR-0013).

  Two-layer enforcement
  ---------------------
  The CLI enforces evidence at the trust state-machine level: `firetrail
  memory promote` rejects a Reviewed→Verified path for a high-stakes
  record unless `--evidence-url` is supplied (caught here as the
  state-machine guard). The `check pr` rule is the audit-time backstop
  that fires whenever a high-stakes record reaches Verified within the
  diff and the head record does NOT carry an `evidence:` marker on the
  last history entry's `ops_summary`. Together they form belt-and-braces
  coverage of ADR-0013.

  Marker contract (firetrail-yte)
  -------------------------------
  `firetrail memory {review,promote}` writes an `evidence: type=<kind>
  url=<url>` marker line into `HistoryEntry::ops_summary` whenever the
  reviewer supplies `--evidence-url`. ft-pr's `evidence_required` rule
  performs a case-insensitive substring match on `evidence:` in the head
  entry's ops_summary, so a high-stakes Reviewed→Verified promotion that
  passes through the state-machine guard also clears the audit rule —
  belt-and-braces coverage of ADR-0013 without a manual workaround.

setup:
  config:
    storage_mode: embedded
    strict_identity: false
    author_email: alice@example.com
    author_name: Alice Tester

steps:
  - name: init repo on main
    run: firetrail init --json --no-hooks --no-agents
    expect:
      exit: 0

  - name: stage init artifacts
    run: git add -A
    expect:
      exit: 0
  - name: baseline commit on main
    run: git commit -q -m "seed firetrail workspace"
    expect:
      exit: 0

  - name: alice creates a high-stakes finding
    run: firetrail --json finding create "Token bypass under load" --details "Auth tokens past TTL accepted on the legacy edge." --risk-class security
    expect:
      exit: 0
      stdout_json_path:
        data.record.body.trust: draft
        data.record.body.risk_class: security
    capture:
      finding_id: stdout_field=data.record.envelope.id

  - name: commit the draft finding
    run: sh -c 'git add -A && git commit -q -m "alice captures high-stakes finding"'
    expect:
      exit: 0

  - name: capture base ref
    run: git rev-parse HEAD
    expect:
      exit: 0
    capture:
      base_sha: stdout

  - name: branch off main
    run: git checkout -q -b feature/promote-finding
    expect:
      exit: 0

  - name: bob reviews the finding (draft → reviewed)
    run: firetrail --json memory review ${finding_id} --reason "log review"
    env:
      FIRETRAIL_AUTHOR: bob@example.com
    expect:
      exit: 0
      stdout_json_path:
        data.record.body.trust: reviewed

  - name: carol cannot promote a high-stakes finding without evidence (state-machine guard)
    # First line of ADR-0013 enforcement: the CLI refuses before the
    # file is written. This is what every agent path hits.
    run: firetrail --json memory promote ${finding_id} --reason "trust me"
    env:
      FIRETRAIL_AUTHOR: carol@example.com
    expect:
      exit: 1
      stderr_contains: "high-stakes"
      stderr_json_path:
        error.kind: user_error

  - name: carol promotes with evidence (reviewed → verified)
    run: firetrail --json memory promote ${finding_id} --reason "validated by load test" --evidence-url "https://ci.example.com/runs/42"
    env:
      FIRETRAIL_AUTHOR: carol@example.com
    expect:
      exit: 0
      stdout_json_path:
        data.record.body.trust: verified

  - name: commit the trust transitions
    run: sh -c 'git add -A && git commit -q -m "bob and carol promote with evidence"'
    expect:
      exit: 0

  - name: capture head ref
    run: git rev-parse HEAD
    expect:
      exit: 0
    capture:
      head_sha: stdout

  - name: check pr is clean — the evidence marker landed in ops_summary
    # The head record IS Verified + high-stakes, but ops_summary now
    # carries the `evidence: type=<kind> url=<url>` marker that the
    # `evidence_required` rule matches on. Result: rule clears, the PR
    # exits 0 even without `--no-secret-scan`.
    run: firetrail --json check pr ${base_sha} ${head_sha}
    expect:
      exit: 0
      stdout_json_path:
        data.report.summary.errors: 0

  - name: chain still verifies after Draft→Reviewed→Verified with evidence
    # The record itself is valid — the only divergence is between
    # ft-pr's marker contract and the CLI's history payload. Verify is
    # the on-disk chain check and is unaffected.
    run: firetrail --json verify ${finding_id}
    expect:
      exit: 0
      stdout_json_path:
        data.failures: 0
