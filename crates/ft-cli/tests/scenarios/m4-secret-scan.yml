name: m4-secret-scan
description: |
  M4 success criterion #4 — `check pr` flags suspected secrets embedded in
  record bodies via the default ft-pr regex pattern set.

  The default pattern set includes AWS access-key ids (`\bAKIA[0-9A-Z]{16}\b`).
  We plant such a value in a finding's `details` field and assert that
  `secret_leak` fires as a blocking error. The redaction contract is
  exercised by inspecting the structured details (the match preview is
  masked, not echoed verbatim) and by stderr_contains on `secret`.

  Negative case: a fresh memory record with no AKIA-shaped content passes
  through cleanly, confirming the scanner is precision-tuned and not
  blanket-rejecting record-only diffs.

setup:
  config:
    storage_mode: embedded
    strict_identity: false
    author_email: alice@example.com
    author_name: Alice Tester

steps:
  - name: init repo on main
    run: firetrail init --json --no-hooks --no-agents
    expect:
      exit: 0

  - name: baseline commit on main
    run: sh -c 'git add -A && git commit -q -m "seed firetrail workspace"'
    expect:
      exit: 0

  - name: capture base ref
    run: git rev-parse HEAD
    expect:
      exit: 0
    capture:
      base_sha: stdout

  - name: branch off to feature/leak
    run: git checkout -q -b feature/leak
    expect:
      exit: 0

  - name: create a finding whose details contain a simulated AWS access key
    # AKIA1234567890ABCDEF is a textbook 20-char AWS access key id; the
    # default pattern set matches it. Keeping the surrounding prose
    # plausible so the scanner sees a free-form string and not a struct
    # field that the SKIP_FIELDS list excludes.
    run: firetrail --json finding create "agent leaked an AWS key" --details "Found AKIA1234567890ABCDEF in agent transcript" --risk-class security
    expect:
      exit: 0
    capture:
      leaky_id: stdout_field=data.record.envelope.id

  - name: commit the leaky finding
    run: sh -c 'git add -A && git commit -q -m "leak via finding details"'
    expect:
      exit: 0

  - name: capture head ref
    run: git rev-parse HEAD
    expect:
      exit: 0
    capture:
      head_sha: stdout

  - name: check pr surfaces secret_leak as a blocking error
    run: firetrail --json check pr ${base_sha} ${head_sha}
    expect:
      exit: 1
      stderr_contains: secret
      stderr_json_path:
        error.kind: user_error
        error.details.report.findings.0.rule: secret_leak
        error.details.report.findings.0.severity: error

  - name: secret-scan can be disabled with --no-secret-scan (escape hatch)
    # The scanner is conservative-by-default; the escape hatch lets an
    # operator unblock a PR that produced a false positive without
    # touching the source record. The same diff should now pass.
    run: firetrail --json check pr ${base_sha} ${head_sha} --no-secret-scan
    expect:
      exit: 0
      stdout_json_path:
        data.secret_scan_enabled: false
